<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>候補記事レビュー｜地域たすけあいマップ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;background:#FAFAF7;color:#1a1a1a;font-size:14px}
.hdr{background:#1B4332;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:15px;font-weight:500}
.hdr p{font-size:12px;opacity:.75;margin-left:auto}
.body{max-width:860px;margin:0 auto;padding:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e0ddd5;border-radius:8px;padding:10px 14px}
.stat .num{font-size:22px;font-weight:500;line-height:1}
.stat .lbl{font-size:12px;color:#888;margin-top:3px}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:5px 14px;border-radius:20px;border:1px solid #ccc;background:transparent;font-size:13px;cursor:pointer;font-family:inherit;color:#555}
.fb.on{background:#1B4332;color:#fff;border-color:#1B4332}
.card{background:#fff;border:1px solid #e0ddd5;border-left:3px solid #E8834A;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:8px;display:block}
.card.ok{border-left-color:#1B4332}
.card.ng{border-left-color:#ccc;opacity:.5}
.ttl{font-size:14px;font-weight:700;margin-bottom:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-left:6px;vertical-align:middle}
.badge.new{background:#FFF0E8;color:#A0522D}
.badge.ok{background:#D8F3DC;color:#1B4332}
.badge.ng{background:#eee;color:#888}
.meta{font-size:12px;color:#888;margin-bottom:6px}
.summary{font-size:13px;color:#555;line-height:1.6;margin-bottom:10px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 14px;border-radius:20px;border:1px solid #ccc;background:#f5f5f5;font-size:12px;cursor:pointer;font-family:inherit;color:#333;text-decoration:none}
.btn:hover{background:#eee}
.btn.primary{background:#1B4332;color:#fff;border-color:#1B4332}
.btn.primary:hover{background:#2D6A4F}
.btn.danger{background:#fde8e8;color:#c0392b;border-color:#f5c6c6}
.empty{text-align:center;color:#888;padding:40px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B4332;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <h1>📋 候補記事レビュー</h1>
  <p>自動巡回で見つかった記事を確認してください</p>
</div>

<div class="body">
  <div class="stats">
    <div class="stat"><div class="num" id="cnt-all">0</div><div class="lbl">合計</div></div>
    <div class="stat"><div class="num" id="cnt-new" style="color:#E8834A">0</div><div class="lbl">未確認</div></div>
    <div class="stat"><div class="num" id="cnt-ok" style="color:#1B4332">0</div><div class="lbl">承認済み</div></div>
    <div class="stat"><div class="num" id="cnt-ng">0</div><div class="lbl">却下</div></div>
  </div>

  <div class="filters">
    <button class="fb on" id="fb-all" onclick="setF('all',this)">全て</button>
    <button class="fb" id="fb-new" onclick="setF('new',this)">未確認のみ</button>
    <button class="fb" id="fb-ok" onclick="setF('ok',this)">承認済み</button>
    <button class="fb" id="fb-ng" onclick="setF('ng',this)">却下</button>
  </div>

  <div id="cards"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var items = [];
var filt = 'all';

function getStatus(id){ return localStorage.getItem('rv_'+id)||'new'; }

function approve(idx) {
  var c = items[idx];
  if(!c) return;
  localStorage.setItem('rv_'+c.id, 'ok');
  items[idx] = Object.assign({}, c, {st:'ok'});
  showToast('承認しました');
  filt = 'ok';
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('fb-ok').classList.add('on');
  draw();
}

function reject(idx) {
  var c = items[idx];
  if(!c) return;
  localStorage.setItem('rv_'+c.id, 'ng');
  items[idx] = Object.assign({}, c, {st:'ng'});
  draw();
}

function openLink(idx) {
  var c = items[idx];
  if(!c) return;
  var a = document.createElement('a');
  a.href = c.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1500);
}

function setF(f, btn) {
  filt = f;
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  draw();
}

function draw() {
  var list = [];
  var idxMap = [];
  for(var i=0;i<items.length;i++){
    if(filt==='all' || items[i].st===filt){
      list.push(items[i]);
      idxMap.push(i);
    }
  }

  document.getElementById('cnt-all').textContent = items.length;
  document.getElementById('cnt-new').textContent = items.filter(function(c){ return c.st==='new'; }).length;
  document.getElementById('cnt-ok').textContent = items.filter(function(c){ return c.st==='ok'; }).length;
  document.getElementById('cnt-ng').textContent = items.filter(function(c){ return c.st==='ng'; }).length;

  var box = document.getElementById('cards');
  if(!list.length){
    box.innerHTML = '<div class="empty">該当する記事がありません</div>';
    return;
  }

  var html = '';
  for(var j=0;j<list.length;j++){
    var c = list[j];
    var realIdx = idxMap[j];
    var bc = c.st==='ok'?'ok':c.st==='ng'?'ng':'new';
    var bt = c.st==='ok'?'承認済み':c.st==='ng'?'却下':'未確認';
    html += '<div class="card '+c.st+'">'
      + '<div class="ttl">' + escHtml(c.title) + '<span class="badge '+bc+'">'+bt+'</span></div>'
      + '<div class="meta">' + escHtml(c.source) + ' | ' + escHtml(c.keyword) + ' | ' + escHtml(c.found_at) + '</div>'
      + '<div class="summary">' + escHtml(c.summary) + '</div>'
      + '<div class="actions">'
      + '<button class="btn" data-action="open" data-idx="'+realIdx+'">🔗 記事を開く</button>'
      + '<button class="btn primary" data-action="approve" data-idx="'+realIdx+'">✅ 承認</button>'
      + '<button class="btn danger" data-action="reject" data-idx="'+realIdx+'">❌ 却下</button>'
      + '</div></div>';
  }
  box.innerHTML = html;
}

function escHtml(str) {
  if(!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

document.getElementById('cards').addEventListener('click', function(e) {
  var btn = e.target.closest('button[data-action]');
  if(!btn) return;
  e.preventDefault();
  e.stopPropagation();
  var action = btn.getAttribute('data-action');
  var idx = parseInt(btn.getAttribute('data-idx'), 10);
  if(action==='open') openLink(idx);
  else if(action==='approve') approve(idx);
  else if(action==='reject') reject(idx);
});

fetch('data/candidates.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    items = data.map(function(c){ return Object.assign({},c,{st:getStatus(c.id)}); });
    draw();
  })
  .catch(function(){
    document.getElementById('cards').innerHTML = '<div class="empty">データが見つかりません。data/candidates.json を確認してください。</div>';
  });
</script>
</body>
</html>
